# Render Blueprint — one Web Service that BOTH serves the game (dist/) and runs
# the WebSocket battle server. Connect this repo on render.com and it auto-configures.
services:
  - type: web
    name: pokebrawl
    runtime: node
    plan: free # free sleeps after ~15min idle; use "starter" for always-on
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      # PokéCoin (devnet SPL token, burned to buy Pokémon) — set these in the
      # Render dashboard, NOT here (this file is committed to git). See
      # create-coin-mint.mts for how they're generated.
      - key: COIN_MINT_SECRET
        sync: false
      - key: COIN_MINT_ADDRESS
        sync: false
      # Accounts (server/schema.sql) — Postgres connection string (Neon, etc.)
      # and the secret that signs session tokens. Set both in the Render
      # dashboard, NOT here.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      # SOL wager escrow (mainnet-beta — real money) — the authority keypair
      # that signs settle/refund/cancel once a wagered match ends. Set in the
      # Render dashboard, NOT here. See .secrets/mainnet-escrow-authority.json
      # (gitignored).
      - key: ESCROW_AUTHORITY_SECRET
        sync: false
      # A keyed/metered mainnet RPC endpoint (e.g. Helius) — strongly
      # recommended over the public clusterApiUrl('mainnet-beta') fallback
      # for real production traffic. Set in the Render dashboard.
      - key: ESCROW_RPC_URL
        sync: false
      # Shared secret for /api/admin/wagering (kill-switch) and
      # /api/admin/status. Admin endpoints are fully disabled (404) until
      # this is set. Set in the Render dashboard, NOT here.
      - key: ADMIN_SECRET
        sync: false
      # Optional: a Discord-compatible webhook URL — operational alerts
      # (escrow authority low on fee SOL, a settlement stuck after repeated
      # retries) get posted here. Falls back to server logs only if unset.
      - key: ALERT_WEBHOOK_URL
        sync: false
